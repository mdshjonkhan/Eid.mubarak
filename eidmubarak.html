<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ঈদ মোবারক — মেরাজ</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Serif+Bengali:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --g1:#B8860B;--g2:#FFD700;--g3:#F0C030;--g4:#DAA520;
  --deep:#040C16;--mid:#0A1628;--cream:#FFF8E7;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--deep);font-family:'Playfair Display',serif}

/* ── LAYERS ── */
#l-sky,#l-stars,#l-aurora,#l-geo,#l-dust,#l-mosque,#l-fog,#l-content{
  position:fixed;inset:0;width:100%;height:100%;
}

/* SKY */
#l-sky{
  z-index:0;
  background:
    radial-gradient(ellipse 90% 55% at 50% -5%,#1a3652 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 15% 25%,#0d2038 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 25%,#0d2038 0%,transparent 55%),
    linear-gradient(180deg,#030A14 0%,#071422 40%,#0A1828 70%,#040C16 100%);
}

/* AURORA */
#l-aurora{z-index:1;pointer-events:none;overflow:hidden}
.ab{
  position:absolute;width:220%;height:280px;left:-60%;
  border-radius:50%;filter:blur(65px);
  animation:adrift var(--d) ease-in-out infinite alternate;
  animation-delay:var(--dl);
}
.ab:nth-child(1){top:3%;background:radial-gradient(ellipse,rgba(15,70,50,.38) 0%,transparent 70%);--d:14s;--dl:0s}
.ab:nth-child(2){top:10%;background:radial-gradient(ellipse,rgba(35,25,80,.28) 0%,transparent 70%);--d:17s;--dl:-6s}
.ab:nth-child(3){top:6%;background:radial-gradient(ellipse,rgba(70,45,8,.22) 0%,transparent 70%);--d:20s;--dl:-10s}
@keyframes adrift{
  0%{opacity:.3;transform:translateX(-12%) scaleY(1)}
  50%{opacity:.75;transform:translateX(6%) scaleY(1.35)}
  100%{opacity:.35;transform:translateX(12%) scaleY(.85)}
}

/* STARS */
#l-stars{z-index:2;pointer-events:none}
.star{
  position:absolute;border-radius:50%;background:white;
  animation:twink var(--td) ease-in-out infinite;animation-delay:var(--tl);
}
@keyframes twink{
  0%,100%{opacity:var(--lo);transform:scale(1)}
  50%{opacity:var(--hi);transform:scale(1.5)}
}

/* ISLAMIC GEO PATTERN */
#l-geo{
  z-index:3;pointer-events:none;opacity:.038;
  background-image:
    repeating-linear-gradient(45deg,rgba(201,168,76,.5) 0,rgba(201,168,76,.5) 1px,transparent 0,transparent 50%),
    repeating-linear-gradient(-45deg,rgba(201,168,76,.5) 0,rgba(201,168,76,.5) 1px,transparent 0,transparent 50%),
    repeating-linear-gradient(0deg,rgba(201,168,76,.2) 0,rgba(201,168,76,.2) 1px,transparent 0,transparent 60px);
  background-size:30px 30px,30px 30px,60px 60px;
  mask-image:radial-gradient(ellipse 85% 55% at 50% 0%,black 0%,transparent 85%);
}

/* DUST PARTICLES */
#l-dust{z-index:4;pointer-events:none}
.dp{
  position:absolute;border-radius:50%;
  animation:dustfl var(--dd) ease-in-out infinite;animation-delay:var(--ddl);
}
@keyframes dustfl{
  0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}
  8%{opacity:var(--dop)}
  92%{opacity:var(--dop)}
  100%{transform:translateY(-100vh) translateX(var(--dx)) rotate(720deg);opacity:0}
}

/* MOSQUE */
#l-mosque{
  z-index:5;pointer-events:none;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;animation:mosqueIn 3.5s cubic-bezier(.22,1,.36,1) forwards 1.2s;
}
@keyframes mosqueIn{
  0%{opacity:0;filter:blur(25px) brightness(.4);transform:translateY(50px) scale(.97)}
  60%{filter:blur(4px) brightness(.85)}
  100%{opacity:1;filter:blur(0) brightness(1);transform:translateY(0) scale(1)}
}

/* FOG */
#l-fog{
  z-index:6;pointer-events:none;
  background:linear-gradient(0deg,rgba(4,12,22,.92) 0%,rgba(4,12,22,.45) 22%,transparent 50%);
}

/* MOON */
#moon{
  position:fixed;top:6vh;right:9vw;z-index:7;
  opacity:0;animation:moonIn 2.8s cubic-bezier(.22,1,.36,1) forwards .6s;
}
@keyframes moonIn{
  0%{opacity:0;transform:translateY(-40px) scale(.65);filter:blur(15px)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
.mglow{
  position:absolute;inset:-50px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,215,0,.15) 0%,rgba(255,180,30,.05) 50%,transparent 70%);
  animation:mgpulse 4.5s ease-in-out infinite;
}
@keyframes mgpulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.2);opacity:1}}

/* LANTERNS */
.lw{
  position:fixed;z-index:7;opacity:0;
  transform-origin:top center;
}
.lw:nth-child(1){left:3.5vw;top:0;animation:ldrop 1.4s cubic-bezier(.34,1.56,.64,1) forwards 1.8s,lsway 4.2s ease-in-out 3.2s infinite}
.lw:nth-child(2){left:13vw;top:0; animation:ldrop 1.4s cubic-bezier(.34,1.56,.64,1) forwards 2.0s,lsway 5.1s ease-in-out 3.4s infinite}
.lw:nth-child(3){right:3.5vw;top:0;animation:ldrop 1.4s cubic-bezier(.34,1.56,.64,1) forwards 1.9s,lsway 4.7s ease-in-out 3.3s infinite}
.lw:nth-child(4){right:13vw;top:0; animation:ldrop 1.4s cubic-bezier(.34,1.56,.64,1) forwards 2.1s,lsway 5.5s ease-in-out 3.5s infinite}
@keyframes ldrop{0%{opacity:0;transform:translateY(-70px)}100%{opacity:1;transform:translateY(0)}}
@keyframes lsway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.rope{width:2px;background:linear-gradient(180deg,rgba(201,168,76,.55),rgba(201,168,76,.25));margin:0 auto}

/* BUNTING */
.bunt{
  position:fixed;top:0;left:0;width:100%;height:22vh;
  z-index:7;pointer-events:none;
  opacity:0;animation:fi 2s forwards 2.4s;
}

/* CORNER ORNAMENTS */
.corn{
  position:fixed;width:130px;height:130px;z-index:8;pointer-events:none;
  opacity:0;animation:fi 2s forwards 2.8s;
}
.corn.tl{top:0;left:0}
.corn.tr{top:0;right:0;transform:scaleX(-1)}
.corn.bl{bottom:0;left:0;transform:scaleY(-1)}
.corn.br{bottom:0;right:0;transform:scale(-1,-1)}

/* CONTENT */
#l-content{
  z-index:9;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding-bottom:20vh;pointer-events:none;
  gap:4px;
}
.bismillah{
  font-family:'Amiri Quran',serif;
  font-size:clamp(1.1rem,3vw,2rem);
  color:rgba(240,200,80,.6);
  direction:rtl;letter-spacing:.08em;
  opacity:0;animation:sld 1.2s ease forwards 2.8s;
  text-shadow:0 0 35px rgba(218,165,32,.4);
}
.arb{
  font-family:'Amiri',serif;
  font-size:clamp(2rem,6.5vw,4.5rem);
  color:var(--g3);direction:rtl;
  opacity:0;animation:sld 1.4s cubic-bezier(.22,1,.36,1) forwards 3.2s;
  text-shadow:0 0 60px rgba(255,215,0,.5),0 3px 20px rgba(0,0,0,.9);
  line-height:1.25;margin-top:4px;
}
.rule{
  display:flex;align-items:center;gap:10px;
  margin:14px 0 10px;
  opacity:0;animation:fi 1s forwards 3.8s;
}
.rule::before,.rule::after{
  content:'';height:1px;width:100px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.7),transparent);
}
.rdia{color:var(--g2);font-size:.9rem}
.etitle{
  font-family:'Playfair Display',serif;font-weight:700;
  font-size:clamp(4.5rem,15vw,12rem);
  letter-spacing:.04em;line-height:.9;
  opacity:0;
  background:linear-gradient(135deg,#7a5b0a 0%,#c9a84c 18%,#ffd700 33%,#fff5b0 50%,#ffd700 67%,#c9a84c 82%,#7a5b0a 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 8px 45px rgba(218,165,32,.55));
  animation:grand 2.2s cubic-bezier(.16,1,.3,1) forwards 3.6s, shim 5s linear 6s infinite;
}
@keyframes grand{
  0%{opacity:0;transform:scale(.55) translateY(40px);filter:blur(25px) drop-shadow(0 0 0 transparent)}
  65%{filter:blur(2px) drop-shadow(0 8px 45px rgba(218,165,32,.55))}
  100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0) drop-shadow(0 8px 45px rgba(218,165,32,.55))}
}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sub{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(1rem,3vw,2rem);
  color:rgba(240,200,80,.75);letter-spacing:.35em;text-transform:uppercase;
  opacity:0;animation:fi 1.5s ease forwards 5.2s;
  text-shadow:0 0 30px rgba(218,165,32,.3);
  margin-top:6px;
}
.ded{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  margin-top:22px;opacity:0;animation:fi 2s ease forwards 5.8s;
}
.ded-bn{
  font-family:'Noto Serif Bengali',serif;
  font-size:clamp(.85rem,2.2vw,1.3rem);
  color:rgba(255,240,180,.72);letter-spacing:.04em;
  text-align:center;line-height:1.9;
  text-shadow:0 0 20px rgba(218,165,32,.3);max-width:580px;padding:0 20px;
}
.ded-name{
  font-family:'Playfair Display',serif;font-weight:700;font-style:italic;
  font-size:clamp(2rem,5.5vw,3.8rem);
  color:var(--g2);letter-spacing:.18em;
  text-shadow:0 0 50px rgba(255,215,0,.65),0 3px 12px rgba(0,0,0,.85);
  animation:npulse 3.5s ease-in-out 7s infinite;
}
@keyframes npulse{
  0%,100%{text-shadow:0 0 50px rgba(255,215,0,.6),0 3px 12px rgba(0,0,0,.85)}
  50%{text-shadow:0 0 100px rgba(255,215,0,1),0 0 40px rgba(255,200,50,.6),0 3px 12px rgba(0,0,0,.85)}
}
.ded-small{
  font-family:'Noto Serif Bengali',serif;
  font-size:clamp(.7rem,1.6vw,.95rem);
  color:rgba(240,200,80,.45);letter-spacing:.04em;
}

/* TTS subtitle */
#tts-sub{
  position:fixed;bottom:8vh;left:50%;transform:translateX(-50%);
  z-index:11;text-align:center;pointer-events:none;
  width:92%;max-width:720px;
}
.tts-txt{
  font-family:'Noto Serif Bengali',serif;
  font-size:clamp(.95rem,2.5vw,1.4rem);
  color:rgba(255,240,180,0);
  letter-spacing:.04em;line-height:1.75;
  transition:color 1s ease,text-shadow 1s ease;
  text-shadow:0 0 0 transparent;
}
.tts-txt.on{color:rgba(255,240,180,.9);text-shadow:0 0 25px rgba(218,165,32,.5)}

/* FLOATING SYMBOLS */
.fsym{
  position:fixed;z-index:8;pointer-events:none;
  font-size:clamp(.9rem,2.2vw,1.6rem);
  opacity:0;animation:fsy var(--fd) ease-in-out var(--fl) infinite;
}
@keyframes fsy{
  0%{opacity:0;transform:translateY(18px) scale(.8) rotate(-5deg)}
  15%{opacity:var(--fo)}85%{opacity:var(--fo)}
  100%{opacity:0;transform:translateY(-25px) scale(1.1) rotate(10deg)}
}

/* AUTO PETALS */
.ap{
  position:fixed;top:-30px;z-index:8;pointer-events:none;
  font-size:var(--ps);color:var(--pc);
  animation:apfall var(--pd) linear var(--pde) infinite;opacity:0;
}
@keyframes apfall{
  0%{transform:translateY(0) translateX(0) rotate(0);opacity:0}
  6%{opacity:.85}94%{opacity:.6}
  100%{transform:translateY(106vh) translateX(var(--px)) rotate(560deg);opacity:0}
}

/* SHOOTING STARS */
.ss{
  position:fixed;z-index:3;pointer-events:none;
  height:2px;border-radius:2px;
  background:linear-gradient(90deg,rgba(255,255,255,.9),transparent);
  opacity:0;animation:ssanim var(--ssd) ease-out var(--ssl) infinite;
}
@keyframes ssanim{
  0%{opacity:0;transform:translate(0,0)}
  5%{opacity:1}50%{opacity:0;transform:translate(220px,85px)}
  100%{opacity:0}
}

/* FIREWORK */
.fwb{position:fixed;z-index:10;pointer-events:none}
.fws{
  position:absolute;border-radius:50%;
  animation:fwfly var(--fd2) ease-out forwards;
}
@keyframes fwfly{
  0%{transform:translate(0,0);opacity:1}
  100%{transform:translate(var(--fx),var(--fy));opacity:0}
}

/* HIDDEN YT */
#yt{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;pointer-events:none}

@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes sld{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

  <defs>
    <filter id="gw"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="wg"><stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/><stop offset="20%" stop-color="#C9A84C" stop-opacity=".7"/><stop offset="80%" stop-color="#C9A84C" stop-opacity=".7"/><stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/></linearGradient>

<script>
// ══ STARS ══
const sl=document.getElementById('l-stars');
for(let i=0;i<240;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*3+.4;
  const lo=(Math.random()*.18+.04).toFixed(2);
  const hi=(Math.random()*.7+.3).toFixed(2);
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*72}%;--td:${2+Math.random()*5}s;--tl:${Math.random()*6}s;--lo:${lo};--hi:${hi};box-shadow:0 0 ${sz*2.5}px rgba(255,255,255,.35)`;
  sl.appendChild(s);
}

// ══ SHOOTING STARS ══
for(let i=0;i<10;i++){
  const ss=document.createElement('div');ss.className='ss';
  ss.style.cssText=`left:${5+Math.random()*55}%;top:${2+Math.random()*28}%;width:${55+Math.random()*110}px;transform:rotate(${14+Math.random()*22}deg);--ssd:${9+Math.random()*13}s;--ssl:${Math.random()*16}s;filter:drop-shadow(0 0 3px rgba(255,255,255,.7))`;
  document.body.appendChild(ss);
}

// ══ DUST PARTICLES ══
const dl=document.getElementById('l-dust');
const dcols=['rgba(201,168,76,.55)','rgba(255,215,0,.45)','rgba(255,255,255,.25)','rgba(218,165,32,.38)'];
for(let i=0;i<60;i++){
  const p=document.createElement('div');p.className='dp';
  const sz=1+Math.random()*3;
  p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${Math.random()*25}%;background:${dcols[Math.floor(Math.random()*dcols.length)]};--dd:${9+Math.random()*16}s;--ddl:${Math.random()*14}s;--dop:${.25+Math.random()*.5};--dx:${-70+Math.random()*140}px;box-shadow:0 0 ${sz*2}px rgba(218,165,32,.35)`;
  dl.appendChild(p);
}

// ══ AUTO PETALS ══
const psyms=['✦','★','✿','☽','✩','◆','❋'];
const pcols=['#FFD700','#C9A84C','rgba(255,248,231,.8)','#F0C030','rgba(218,165,32,.7)'];
for(let i=0;i<30;i++){
  const p=document.createElement('div');p.className='ap';
  p.textContent=psyms[Math.floor(Math.random()*psyms.length)];
  p.style.cssText=`left:${Math.random()*100}%;--ps:${.6+Math.random()*1.1}rem;--pc:${pcols[Math.floor(Math.random()*pcols.length)]};--pd:${7+Math.random()*11}s;--pde:${Math.random()*14}s;--px:${-90+Math.random()*180}px`;
  document.body.appendChild(p);
}

// ══ FLOATING SYMBOLS ══
const fsyms=['🌙','⭐','✨','🌟','💫','🌙','✨','⭐'];
[{l:'7%',t:'38%'},{l:'87%',t:'36%'},{l:'5%',t:'58%'},{l:'91%',t:'54%'},{l:'11%',t:'73%'},{l:'84%',t:'70%'},{l:'2%',t:'48%'},{l:'95%',t:'46%'}].forEach((pos,i)=>{
  const el=document.createElement('div');el.className='fsym';
  el.textContent=fsyms[i];
  el.style.cssText=`left:${pos.l};top:${pos.t};--fd:${5+Math.random()*4}s;--fl:${3.5+Math.random()*5}s;--fo:${.35+Math.random()*.4}`;
  document.body.appendChild(el);
});

// ══ FIREWORKS ══
const fwcols=['#FFD700','#FF6B6B','#74B9FF','#FD79A8','#55EFC4','#FDCB6E','#E17055','#A29BFE','#FFF176'];
function burst(xv,yv,n){
  const el=document.createElement('div');el.className='fwb';
  el.style.left=xv+'vw';el.style.top=yv+'vh';
  const num=n||(18+Math.floor(Math.random()*14));
  for(let i=0;i<num;i++){
    const sp=document.createElement('div');sp.className='fws';
    const ang=(i/num)*Math.PI*2;
    const dist=38+Math.random()*75;
    sp.style.cssText=`background:${fwcols[Math.floor(Math.random()*fwcols.length)]};width:${2+Math.random()*3.5}px;height:${2+Math.random()*3.5}px;--fx:${Math.cos(ang)*dist}px;--fy:${Math.sin(ang)*dist}px;--fd2:${.42+Math.random()*.55}s;box-shadow:0 0 5px currentColor;border-radius:50%`;
    el.appendChild(sp);
  }
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

// Cinematic reveal sequence
[[4.0,22,18],[4.7,72,14],[5.3,50,8],[6.0,28,22],[6.6,68,16],
 [7.2,14,16],[7.7,82,12],[8.3,44,10],[9.2,30,18],[9.8,62,14],
 [10.6,50,8],[11.5,38,20],[12.5,58,10]].forEach(([t,x,y])=>
  setTimeout(()=>burst(x,y),t*1000));

setInterval(()=>{
  const pos=[[18,18],[72,14],[48,8],[28,22],[64,16]];
  const p=pos[Math.floor(Math.random()*pos.length)];
  burst(p[0],p[1]);
  setTimeout(()=>burst(p[0]+12+Math.random()*18,p[1]+4+Math.random()*8),380);
},9000);

// ══ BENGALI TTS ══
const bnMsg='আমার সব থেকে প্রিয় বন্ধুকে জানাই ঈদের শুভেচ্ছা, ঈদ মোবারক মেরাজ';
const ttsl=document.getElementById('ttsl');

function speakBN(){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  ttsl.textContent=bnMsg;
  ttsl.classList.add('on');
  const u=new SpeechSynthesisUtterance(bnMsg);
  const vs=window.speechSynthesis.getVoices();
  const bv=vs.find(v=>v.lang==='bn-BD'||v.lang==='bn-IN'||v.lang.startsWith('bn'));
  if(bv)u.voice=bv;
  u.lang='bn-BD';u.rate=.8;u.pitch=1.08;u.volume=.88;
  u.onend=u.onerror=()=>{
    setTimeout(()=>ttsl.classList.remove('on'),2500);
    setTimeout(speakBN,20000);
  };
  window.speechSynthesis.speak(u);
}
window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
setTimeout(()=>{
  if(window.speechSynthesis.getVoices().length>0) speakBN();
  else window.speechSynthesis.onvoiceschanged=speakBN;
},7000);
</script>
